backend:
  name: github
  repo: luyenluuluci1-dotcom/mth-web-interface-v2
  branch: main
  # Đã gỡ bỏ cấu hình mặc định của Netlify. 
  # Nhân viên có thể đăng nhập bằng mã "Personal Access Token" để an toàn và nhanh chóng.


# Nơi lưu trữ hình ảnh khi nhân viên upload
media_folder: "images/uploads"
# Đường dẫn công khai khi render ra hình ảnh
public_folder: "/images/uploads"

# Tùy chỉnh ngôn ngữ sang Tiếng Việt cho nhân viên dễ xài
locale: "vi"

# Danh sách các nội dung cần quản lý
collections:
  # 1. Quản lý Bài viết Blog
  - name: "blog"
    label: "Bài viết Blog"
    folder: "data/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Tiêu đề bài viết", name: "title", widget: "string"}
      - {label: "Nội dung", name: "body", widget: "markdown"}
      - {label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false}
      - {label: "Danh mục", name: "category", widget: "select", options: ["Skincare Tips", "Makeup Trend", "Wellness"]}
      - {label: "Ngày đăng", name: "date", widget: "datetime"}

  # 2. Quản lý Sản phẩm theo nhu cầu
  - name: "products"
    label: "Sản phẩm (Sản phẩm theo nhu cầu)"
    folder: "data/products"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Tên sản phẩm", name: "title", widget: "string"}
      - {label: "Nhu cầu (Danh mục chính)", name: "category", widget: "select", options: ["Dưỡng Da", "Trang Điểm", "Wellness"]}
      - {label: "Thương hiệu / Phân loại phụ", name: "vendor", widget: "string", default: "MTH Beauty"}
      - {label: "Giá gốc (VNĐ)", name: "original_price", widget: "number", value_type: "int"}
      - {label: "Giá đang bán (VNĐ)", name: "current_price", widget: "number", value_type: "int"}
      - {label: "Mô tả ngắn", name: "description", widget: "text"}
      - {label: "Ảnh sản phẩm", name: "image", widget: "image"}
      - {label: "Nhãn nổi bật (Badge)", name: "badge", widget: "string", required: false, hint: "Vd: DA DẦU MỤN, COMBO, HOT..."}
